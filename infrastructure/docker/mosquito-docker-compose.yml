services:

  # -------------------------
  # TimescaleDB
  # -------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: timescaledb
    environment:
      POSTGRES_PASSWORD: noida1**
      POSTGRES_DB: video_analytics
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    restart: unless-stopped

  # -------------------------
  # FastAPI Backend
  # -------------------------
  api:
    build: ../../services/api
    container_name: video-api
    ports:
      - "8000:8000"
    depends_on:
      - timescaledb
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: video_analytics
      DB_USER: postgres
      DB_PASSWORD: noida1**
    restart: unless-stopped

  # -------------------------
  # React Frontend
  # -------------------------
  frontend:
    build: ../../frontend/react-dashboard
    container_name: react-ui
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  # -------------------------
  # MQTT Broker
  # -------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

    # -------------------------
  # Redis Cache
  # -------------------------
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
  # -------------------------
  # MQTT → Timescale Ingestion
  # -------------------------
  ingestion:
    build: ../../services/ingestion
    container_name: ingestion
    depends_on:
      - timescaledb
      - mosquitto
      - redis
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: video_analytics
      DB_USER: postgres
      DB_PASSWORD: noida1**
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
    restart: unless-stopped

  # -------------------------
  # Triton Inference Server (GPU)
  # -------------------------
  triton:
    image: nvcr.io/nvidia/tritonserver:24.02-py3
    container_name: triton
    ports:
      - "8001:8001"   # gRPC
      - "8002:8002"   # HTTP
    volumes:
      - ../../services/inference/models:/models
    command: tritonserver --model-repository=/models
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

volumes:
  timescale_data:
  mosquitto_data:
  mosquitto_log: