version: "3.9"

services:

  # -------------------------
  # TimescaleDB
  # -------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: timescaledb
    environment:
      POSTGRES_PASSWORD: noida1**
      POSTGRES_DB: video_analytics
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    restart: unless-stopped

  # -------------------------
  # FastAPI Backend
  # -------------------------
  api:
    build: ../../services/api
    container_name: video-api
    ports:
      - "8000:8000"
    depends_on:
      - timescaledb
    environment:
      DB_HOST: timescaledb
    restart: unless-stopped

  # -------------------------
  # React Frontend
  # -------------------------
  frontend:
    build: ../../frontend/react-dashboard
    container_name: react-ui
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  # -------------------------
  # RabbitMQ Broker
  # -------------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

  # -------------------------
  # Redis Cache
  # -------------------------
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # -------------------------
  # Ingestion (RabbitMQ → DB)
  # -------------------------
  ingestion:
    build: ../../services/ingestion
    container_name: ingestion
    depends_on:
      - timescaledb
      - rabbitmq
      - redis
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: video_analytics
      DB_USER: postgres
      DB_PASSWORD: noida1**
      RABBITMQ_HOST: rabbitmq
    restart: unless-stopped

  # -------------------------
  # Triton Inference Server
  # -------------------------
  triton:
    image: nvcr.io/nvidia/tritonserver:24.02-py3
    container_name: triton
    ports:
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ../../services/inference/models:/models
    command: tritonserver --model-repository=/models
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

volumes:
  timescale_data: